spring.application.name=stock-sync-scheduler

# Stock Service Configuration - Use Docker service name for networking
api.stock.sync.service.base-url=http://stock-service:4001
api.stock.sync.service.sync-products-uri=/api/products/sync

# Cron for Vendor A - Runs at minutes 00, 10, 20, 30, 40, 50
stock.sync.vendorA.cron=0 0/10 * * * *
stock.sync.vendorA.timezone=UTC

# Cron for Vendor B - Runs at minutes 05, 15, 25, 35, 45, 55
stock.sync.vendorB.cron=0 5/10 * * * *
stock.sync.vendorB.timezone=UTC

# Logging and management
logging.level.com.naisa.stock_sync_scheduler=INFO
management.endpoints.web.exposure.include=health,info

